name: Documentation issue
description: Something in the docs is wrong, missing, or unclear.
labels: ["type:docs", "area:docs"]
body:
  - type: input
    id: page
    attributes:
      label: Page / file
      placeholder: "docs/QUICKSTART.md"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
