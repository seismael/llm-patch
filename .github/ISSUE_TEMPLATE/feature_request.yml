name: Feature request
description: Suggest a new capability for the engine, CLI, or docs.
labels: ["type:enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain motivates this feature?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:cli
        - area:engine
        - area:registry
        - area:docs
        - area:plugin-discovery
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: notes
    attributes:
      label: Additional context (optional)
