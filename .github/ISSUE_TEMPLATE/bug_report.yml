name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please run `llm-patch doctor --json`
        first and paste the output below — it captures most of the
        environment context we'll need.
  - type: input
    id: version
    attributes:
      label: llm-patch version
      description: Output of `llm-patch version`.
      placeholder: "llm-patch 0.3.0 (Python 3.11.x)"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`llm-patch doctor --json` output"
      render: json
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code that trigger the bug.
      placeholder: |
        1. llm-patch init --non-interactive
        2. llm-patch compile ./notes --output ./out
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full traceback or error output.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context (optional)
